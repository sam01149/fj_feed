<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#080b0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FJFeed">
<title>FJFeed</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b0f;
  --surface: #0e1318;
  --border: #1a2230;
  --accent: #00e5ff;
  --text: #e2e8f0;
  --muted: #4a5568;
  --green: #00c896;
  --red: #ff4757;
  --yellow: #ffd32a;
  --orange: #ff6b35;
  --purple: #a78bfa;
  --pink: #f472b6;
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  flex-shrink: 0;
  background: rgba(8,11,15,0.97);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 100;
}
.logo { font-family:'Syne',sans-serif; font-weight:800; font-size:20px; color:var(--accent); letter-spacing:-1px; }
.logo span { color:var(--text); }
.header-right { display:flex; align-items:center; gap:10px; }
.status-pill {
  display: flex; align-items: center; gap: 5px;
  padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border);
  font-size: 9px; letter-spacing: 0.8px; color: var(--muted);
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--muted); transition:all .3s; }
.dot.live { background:var(--green); box-shadow:0 0 6px var(--green); animation:blink 2s infinite; }
.dot.loading { background:var(--yellow); }
.dot.error { background:var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.notif-btn {
  width:32px; height:32px; border-radius:50%;
  border:1px solid var(--border); background:transparent;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .2s; color:var(--muted);
  font-size:15px;
}
.notif-btn.enabled { border-color:var(--accent); color:var(--accent); }
.notif-btn:active { transform:scale(.9); }

/* STATS */
.stats-bar {
  flex-shrink: 0;
  display:flex; gap:0;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  overflow-x:auto; scrollbar-width:none;
}
.stats-bar::-webkit-scrollbar { display:none; }
.stat {
  flex-shrink:0; padding:8px 14px;
  display:flex; flex-direction:column; gap:2px;
  border-right:1px solid var(--border);
}
.stat-val { font-family:'Syne',sans-serif; font-size:17px; font-weight:700; }
.stat-label { font-size:8px; color:var(--muted); letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }

/* FILTER TABS */
.filter-wrap {
  flex-shrink: 0;
  display:flex; overflow-x:auto; scrollbar-width:none;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  padding:0 8px;
}
.filter-wrap::-webkit-scrollbar { display:none; }
.ftab {
  flex-shrink:0; padding:10px 12px;
  font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.5px;
  color:var(--muted); background:transparent; border:none;
  border-bottom:2px solid transparent; cursor:pointer;
  white-space:nowrap; transition:all .15s; text-transform:uppercase;
}
.ftab.active { color:var(--text); border-bottom-color:var(--accent); }
.ftab:active { opacity:.7; }

/* TOOLBAR */
.toolbar {
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 14px; background:var(--surface);
  border-bottom:1px solid var(--border);
}
.last-update { font-size:10px; color:var(--muted); }
.right-tools { display:flex; align-items:center; gap:10px; }
.auto-label { font-size:10px; color:var(--muted); }
.countdown { font-size:10px; color:var(--accent); min-width:28px; }
.toggle { position:relative; width:34px; height:18px; }
.toggle input { opacity:0; width:0; height:0; }
.tslider {
  position:absolute; inset:0; background:var(--border);
  border-radius:18px; cursor:pointer; transition:.3s;
}
.tslider:before {
  content:''; position:absolute; width:12px; height:12px;
  left:3px; top:3px; background:var(--muted);
  border-radius:50%; transition:.3s;
}
.toggle input:checked + .tslider { background:rgba(0,229,255,.15); }
.toggle input:checked + .tslider:before { transform:translateX(16px); background:var(--accent); }

.refresh-btn {
  display:flex; align-items:center; gap:5px;
  padding:6px 12px; border-radius:5px;
  border:1px solid var(--accent); background:transparent;
  color:var(--accent); font-family:'DM Mono',monospace; font-size:10px;
  cursor:pointer; transition:all .2s;
}
.refresh-btn:active { background:var(--accent); color:var(--bg); }
.refresh-btn.spinning svg { animation:spin .7s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* FEED */
.feed-scroll {
  flex:1; overflow-y:auto; padding:10px 12px 16px;
  -webkit-overflow-scrolling:touch;
}
.feed-scroll::-webkit-scrollbar { display:none; }

.feed-item {
  background:var(--surface); border:1px solid var(--border);
  border-radius:10px; padding:12px 14px; margin-bottom:8px;
  cursor:pointer; transition:all .15s; position:relative;
  overflow:hidden; animation:fadeUp .25s ease both;
}
.feed-item:active { transform:scale(.98); }
@keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

/* category left border colors */
.feed-item::before {
  content:''; position:absolute; left:0; top:0; bottom:0;
  width:3px; border-radius:3px 0 0 3px;
}
.cat-market-moving::before { background:#ff4757; box-shadow:2px 0 8px rgba(255,71,87,.3); }
.cat-forex::before { background:var(--green); }
.cat-equities::before { background:var(--purple); }
.cat-commodities::before { background:#f59e0b; }
.cat-energy::before { background:var(--orange); }
.cat-bonds::before { background:#60a5fa; }
.cat-crypto::before { background:#f472b6; }
.cat-indexes::before { background:#34d399; }
.cat-macro::before { background:var(--accent); }
.cat-econ-data::before { background:#c084fc; }
.cat-geopolitical::before { background:#fb923c; }

.item-meta { display:flex; align-items:center; gap:7px; margin-bottom:6px; flex-wrap:wrap; }
.item-time { font-size:10px; color:var(--accent); letter-spacing:.3px; }

.item-tag {
  font-size:8px; padding:2px 6px; border-radius:3px;
  letter-spacing:.5px; text-transform:uppercase; font-weight:400;
}
.tag-market-moving { background:rgba(255,71,87,.15); color:#ff4757; }
.tag-forex         { background:rgba(0,200,150,.12); color:var(--green); }
.tag-equities      { background:rgba(167,139,250,.12); color:var(--purple); }
.tag-commodities   { background:rgba(245,158,11,.12); color:#f59e0b; }
.tag-energy        { background:rgba(255,107,53,.12); color:var(--orange); }
.tag-bonds         { background:rgba(96,165,250,.12); color:#60a5fa; }
.tag-crypto        { background:rgba(244,114,182,.12); color:var(--pink); }
.tag-indexes       { background:rgba(52,211,153,.12); color:#34d399; }
.tag-macro         { background:rgba(0,229,255,.1); color:var(--accent); }
.tag-econ-data     { background:rgba(192,132,252,.12); color:#c084fc; }
.tag-geopolitical  { background:rgba(251,146,60,.12); color:#fb923c; }

.item-title {
  font-family:'Syne',sans-serif; font-size:13px; font-weight:400;
  line-height:1.45; color:var(--text);
}
.item-desc {
  margin-top:8px; font-size:11px; color:var(--muted); line-height:1.5;
  border-top:1px solid var(--border); padding-top:8px;
}

/* NEW badge */
.new-badge {
  font-size:8px; padding:2px 5px; border-radius:3px;
  background:var(--red); color:#fff; letter-spacing:.3px;
  animation:pulse-badge .8s ease 3;
}
@keyframes pulse-badge { 0%,100%{opacity:1} 50%{opacity:.4} }

/* EMPTY STATE */
.state-box { text-align:center; padding:60px 20px; color:var(--muted); }
.state-box .icon { font-size:36px; margin-bottom:14px; }
.state-box p { font-size:12px; line-height:1.7; }

/* NOTIFICATION TOAST */
.toast {
  position:fixed; top:70px; left:12px; right:12px;
  background:var(--surface); border:1px solid var(--accent);
  border-radius:10px; padding:12px 14px; z-index:999;
  display:none; animation:slideDown .3s ease;
}
@keyframes slideDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
.toast-title { font-family:'Syne',sans-serif; font-size:12px; color:var(--accent); margin-bottom:4px; }
.toast-body { font-size:11px; color:var(--muted); line-height:1.4; }

/* DIGEST TAB HIGHLIGHT */
.ftab[data-view="digest"] { color: var(--yellow); border-bottom-color: transparent; }
.ftab[data-view="digest"].active { color: var(--bg); background: var(--yellow); border-radius: 4px 4px 0 0; border-bottom-color: var(--yellow); }

/* DIGEST PANEL */
.digest-header {
  padding: 16px 0 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.digest-title {
  font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700;
  color: var(--yellow);
}
.digest-meta { font-size: 10px; color: var(--muted); }
.digest-method {
  font-size: 9px; padding: 2px 7px; border-radius: 3px;
  letter-spacing: .5px;
}
.digest-method.gemini { background: rgba(255,211,42,.1); color: var(--yellow); }
.digest-method.fallback { background: rgba(255,255,255,.06); color: var(--muted); }

.digest-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
  position: relative; overflow: hidden;
}
.digest-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--yellow);
}
.digest-lang {
  font-size: 10px; color: var(--yellow); letter-spacing: .5px;
  margin-bottom: 8px; text-transform: uppercase;
}
.digest-text {
  font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 400;
  line-height: 1.6; color: var(--text); white-space: pre-line;
}
.digest-headlines {
  margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px;
}
.digest-hl-title { font-size: 9px; color: var(--muted); letter-spacing: .5px; margin-bottom: 6px; text-transform: uppercase; }
.digest-hl-item {
  font-size: 11px; color: var(--muted); padding: 4px 0;
  border-bottom: 1px solid rgba(255,255,255,.03); line-height: 1.4;
}
.digest-hl-item:last-child { border-bottom: none; }

.digest-sessions {
  display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.sess-btn {
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--muted); font-family: 'DM Mono', monospace; font-size: 10px;
  cursor: pointer; transition: all .2s; letter-spacing: .3px;
}
.sess-btn.active { background: var(--yellow); color: var(--bg); border-color: var(--yellow); }
.sess-btn:active { transform: scale(.95); }

.digest-gen-btn {
  width: 100%; padding: 12px; border-radius: 8px;
  border: 1px solid var(--yellow); background: transparent;
  color: var(--yellow); font-family: 'DM Mono', monospace; font-size: 11px;
  cursor: pointer; transition: all .2s; letter-spacing: .5px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.digest-gen-btn:active { background: var(--yellow); color: var(--bg); }
.digest-gen-btn.loading { opacity: .6; pointer-events: none; }
.digest-gen-btn svg { animation: none; }
.digest-gen-btn.loading svg { animation: spin .7s linear infinite; }

.next-digest {
  font-size: 10px; color: var(--muted); text-align: center;
  padding: 8px 0 4px;
}
.next-digest span { color: var(--yellow); }
.install-banner {
  flex-shrink:0; display:none;
  background:rgba(0,229,255,.07); border-bottom:1px solid rgba(0,229,255,.2);
  padding:10px 14px; align-items:center; gap:10px;
}
.install-banner p { font-size:11px; color:var(--accent); flex:1; line-height:1.4; }
.install-btn {
  flex-shrink:0; padding:6px 12px; border-radius:5px;
  background:var(--accent); color:var(--bg);
  font-family:'DM Mono',monospace; font-size:10px;
  border:none; cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">FJ<span>Feed</span></div>
  <div class="header-right">
    <div class="status-pill">
      <div class="dot" id="dot"></div>
      <span id="statusText">IDLE</span>
    </div>
    <button class="notif-btn" id="notifBtn" onclick="requestNotif()" title="Enable notifications">🔔</button>
  </div>
</div>

<div class="install-banner" id="installBanner">
  <p>Install FJFeed ke homescreen untuk notifikasi background</p>
  <button class="install-btn" id="installBtn">INSTALL</button>
</div>

<!-- STATS -->
<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-val" id="sTotal">—</div><div class="stat-label">Total</div></div>
  <div class="stat"><div class="stat-val" id="sMoving" style="color:#ff4757">—</div><div class="stat-label">Mkt Moving</div></div>
  <div class="stat"><div class="stat-val" id="sFx" style="color:var(--green)">—</div><div class="stat-label">Forex</div></div>
  <div class="stat"><div class="stat-val" id="sMacro" style="color:var(--accent)">—</div><div class="stat-label">Macro</div></div>
  <div class="stat"><div class="stat-val" id="sEnergy" style="color:var(--orange)">—</div><div class="stat-label">Energy</div></div>
  <div class="stat"><div class="stat-val" id="sGeo" style="color:#fb923c">—</div><div class="stat-label">Geopolit.</div></div>
</div>

<!-- FILTER TABS -->
<div class="filter-wrap" id="filterWrap">
  <button class="ftab" data-view="digest" id="digestTab">📋 DIGEST</button>
  <button class="ftab active" data-cat="all">All</button>
  <button class="ftab" data-cat="market-moving">Mkt Moving</button>
  <button class="ftab" data-cat="forex">Forex</button>
  <button class="ftab" data-cat="equities">Equities</button>
  <button class="ftab" data-cat="commodities">Commodities</button>
  <button class="ftab" data-cat="energy">Energy</button>
  <button class="ftab" data-cat="bonds">Bonds</button>
  <button class="ftab" data-cat="crypto">Crypto</button>
  <button class="ftab" data-cat="indexes">Indexes</button>
  <button class="ftab" data-cat="macro">Macro</button>
  <button class="ftab" data-cat="econ-data">Econ Data</button>
  <button class="ftab" data-cat="geopolitical">Geopolitical</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <span class="last-update" id="lastUpdate">Never fetched</span>
  <div class="right-tools">
    <span class="auto-label">AUTO</span>
    <label class="toggle">
      <input type="checkbox" id="autoToggle" onchange="toggleAuto()">
      <span class="tslider"></span>
    </label>
    <span class="countdown" id="cdText"></span>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchFeed()">
      <svg id="rIcon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      FETCH
    </button>
  </div>
</div>

<!-- FEED -->
<div class="feed-scroll" id="feedScroll">
  <div class="state-box">
    <div class="icon">📡</div>
    <p>Tap FETCH untuk load<br>FinancialJuice RSS</p>
  </div>
</div>

<!-- DIGEST PANEL -->
<div class="feed-scroll" id="digestPanel" style="display:none"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <div class="toast-title" id="toastTitle"></div>
  <div class="toast-body" id="toastBody"></div>
</div>

<script>
// Netlify Function endpoint — same origin, no CORS issue
const FETCH_URL = '/.netlify/functions/rss';

const CATS = {
  'market-moving': ['market moving','breaking','flash','urgent','alert','war','blockade'],
  'forex': [
    // Pair notations — all majors + crosses
    'eur/usd','gbp/usd','usd/jpy','aud/usd','usd/cad','nzd/usd','usd/chf','usd/cnh','usd/cny',
    'eur/gbp','eur/jpy','eur/chf','eur/cad','eur/aud','eur/nzd',
    'gbp/jpy','gbp/chf','gbp/cad','gbp/aud','gbp/nzd',
    'aud/jpy','aud/cad','aud/chf','aud/nzd',
    'nzd/jpy','nzd/cad','nzd/chf',
    'cad/jpy','cad/chf',
    'chf/jpy',
    // Reverse notation
    '/usd','/eur','/gbp','/jpy','/cad','/chf','/aud','/nzd','/cnh',
    // Currency names — specific enough to avoid false positives
    'us dollar','euro zone','euro area','the euro','sterling','pound sterling',
    'japanese yen','swiss franc','canadian dollar','australian dollar','new zealand dollar',
    'chinese yuan','chinese renminbi','offshore yuan',
    'loonie','aussie dollar','kiwi dollar','cable','swissy','fiber','greenback',
    // FX market terms
    'fx options','options expir','dollar index','dxy','currency pair',
    'forex','foreign exchange','spot rate','exchange rate',
    // Central bank implied FX
    'boc rate','rba rate','rbnz rate',
    // Exotic mentions common in FJ
    'forint','zloty','krona','won','ringgit','lira','rupee','peso','rand',
  ],
  'equities': ['s&p','nasdaq','dow jones','ftse','dax','nikkei','hang seng','stock','equity','shares','earnings','ipo','nyse','spx','nvda','apple','tesla','meta ','alphabet','microsoft','amazon','samsung','tsmc'],
  'commodities':['gold','silver','copper','wheat','corn','soybean','coffee','cocoa','cotton','lumber','palladium','platinum','xau','xag','commodity','zinc','nickel','iron ore','steel','alumin'],
  'energy':   ['oil','crude','brent','wti','opec','gasoline','diesel','natural gas','barrel','petroleum','hormuz','strait','iea','tanker','refiner','pipeline','lng','energy price','fuel'],
  'bonds':    ['bond','yield','treasury','gilt','bund','t-note','10-year','2-year','30-year','basis point','bps','fixed income','debt','sovereign','auction'],
  'crypto':   ['bitcoin','btc','ethereum','eth','crypto','blockchain','coinbase','binance','stablecoin','defi','nft','altcoin','ripple','xrp','solana'],
  'indexes':  ['pmi','purchasing manager','composite index','manufacturing index','services index','business activity'],
  'macro':    ['fed ','fomc','powell','goolsbee','waller','kashkari','warsh','federal reserve','rate cut','rate hike','interest rate','ecb','boe','rba','boj','pboc','rbnz','boc ','central bank','monetary policy','lagarde','bailey','ueda','imf','world bank','g7','g20','gdp','recession'],
  'econ-data':['actual','forecast','previous','cpi','nfp','unemployment','retail sales','trade balance','consumer confidence','business confidence','industrial production','housing','payroll','nab business','westpac','consumer sentiment','capacity utilization','wholesale price'],
  'geopolitical':['iran','iranian','tehran','nuclear','ceasefire','hezbollah','israel','lebanon','russia','ukraine','china','chinese','xi jinping','beijing','taiwan','north korea','sanction','tariff','trade war','trump','white house','nato','military','war','conflict','diplomat','vance'],
};

function detectCat(title) {
  const t = title.toLowerCase();
  for (const [cat, kws] of Object.entries(CATS)) {
    if (kws.some(k => t.includes(k))) return cat;
  }
  return 'macro';
}

let allItems = [];
let seenGuids = new Set();
let activeFilter = 'all';
let autoInterval = null;
let cdInterval = null;
let cdVal = 60;
let notifEnabled = false;
let deferredInstall = null;
let sw = null;

// ── SERVICE WORKER ──────────────────────────────────────
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').then(reg => {
    sw = reg;
    console.log('[SW] registered');

    // Request periodic sync if supported
    if ('periodicSync' in reg) {
      navigator.permissions.query({ name:'periodic-background-sync' }).then(status => {
        if (status.state === 'granted') {
          reg.periodicSync.register('fjfeed-sync', { minInterval: 60000 }).catch(()=>{});
        }
      });
    }
  }).catch(e => console.warn('[SW] failed', e));

  navigator.serviceWorker.addEventListener('message', e => {
    if (e.data.type === 'NEW_ITEMS') {
      handleNewItems(e.data.items);
    }
  });
}

// ── INSTALL PROMPT ───────────────────────────────────────
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredInstall = e;
  document.getElementById('installBanner').style.display = 'flex';
});
document.getElementById('installBtn').addEventListener('click', () => {
  if (deferredInstall) {
    deferredInstall.prompt();
    deferredInstall.userChoice.then(() => {
      deferredInstall = null;
      document.getElementById('installBanner').style.display = 'none';
    });
  }
});

// ── NOTIFICATIONS ────────────────────────────────────────
const VAPID_PUBLIC_KEY = 'BOL8h0Ial1AMKNRmKeZxgQ69Fsj-Q87Sg-K-Odit2F7fvuSdlYc9tZiUFjQyGagBTS0n1fLxALBKX7TlhZgarRA';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
}

async function requestNotif() {
  if (!('Notification' in window)) {
    showToast('Tidak Didukung', 'Browser ini tidak support notifikasi');
    return;
  }

  const perm = await Notification.requestPermission();
  if (perm !== 'granted') {
    showToast('Ditolak', 'Izinkan notifikasi di pengaturan browser');
    return;
  }

  notifEnabled = true;
  document.getElementById('notifBtn').classList.add('enabled');

  // Try Web Push (server-side push — works when HP off)
  if ('serviceWorker' in navigator && 'PushManager' in window) {
    try {
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
        });
      }
      // Send subscription to server
      const res = await fetch('/.netlify/functions/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ subscription: sub.toJSON() }),
      });
      if (res.ok) {
        showToast('Notifikasi Aktif ✓', 'Push notif aktif — bekerja bahkan saat HP mati layar', 4000);
        localStorage.setItem('pushSubscribed', '1');
      } else {
        throw new Error('Subscribe failed: ' + res.status);
      }
    } catch(e) {
      console.warn('Web Push failed:', e.message);
      showToast('Notifikasi Aktif ✓', 'Notif aktif saat tab terbuka. Untuk background notif, pastikan sudah install PWA.', 5000);
    }
  } else {
    showToast('Notifikasi Aktif ✓', 'Notif aktif (mode terbatas — tab harus terbuka)', 4000);
  }

  sendToSW({ type: 'INIT_GUIDS', guids: [...seenGuids] });
}

function sendToSW(msg) {
  if (navigator.serviceWorker.controller) {
    navigator.serviceWorker.controller.postMessage(msg);
  }
}

function sendLocalNotif(title, body, tag) {
  if (!notifEnabled || Notification.permission !== 'granted') return;
  try {
    new Notification(`[${detectCat(title).replace('-',' ').toUpperCase()}] FJFeed`, {
      body: title,
      tag: tag || 'fjfeed',
      icon: './manifest.json',
      silent: false
    });
  } catch(e) {}
}

// ── FETCH ────────────────────────────────────────────────
async function fetchRSS() {
  try {
    const c = new AbortController();
    setTimeout(() => c.abort(), 12000);
    const r = await fetch(FETCH_URL, { signal: c.signal });
    if (r.ok) {
      const t = await r.text();
      if (t.includes('<rss')) return t;
    }
  } catch(e) {}
  return null;
}

function parseRSS(xml) {
  const items = [];
  const re = /<item>([\s\S]*?)<\/item>/g;
  let m;
  while ((m = re.exec(xml)) !== null) {
    const b = m[1];
    const get = (tag) => {
      const r1 = new RegExp(`<${tag}[^>]*><!\\[CDATA\\[([\\s\\S]*?)\\]\\]><\\/${tag}>`).exec(b);
      const r2 = new RegExp(`<${tag}[^>]*>([\\s\\S]*?)<\\/${tag}>`).exec(b);
      return (r1||r2)?.[1]?.trim() || '';
    };
    const title = get('title').replace(/^FinancialJuice:\s*/i,'').trim();
    const guid  = get('guid');
    const pubDate = get('pubDate');
    const link  = b.match(/<link>(.*?)<\/link>/)?.[1] || '';
    const desc  = get('description');
    if (guid && title) items.push({ title, guid, pubDate, link, desc });
  }
  return items;
}

function handleNewItems(newItems) {
  // Prepend new items
  allItems = [...newItems, ...allItems].slice(0, 200);
  newItems.forEach(i => seenGuids.add(i.guid));

  updateStats();
  renderFeed(true);

  // In-app toast
  if (newItems.length === 1) {
    showToast(`📰 ${detectCat(newItems[0].title).replace('-',' ').toUpperCase()}`, newItems[0].title, 4000);
  } else if (newItems.length > 1) {
    showToast(`📰 ${newItems.length} berita baru`, newItems.map(i=>i.title).slice(0,2).join(' / '), 4000);
  }

  // Local notif fallback (when SW notification didn't fire)
  if (!navigator.serviceWorker.controller) {
    newItems.slice(0, 3).forEach(i => sendLocalNotif(i.title, '', i.guid));
  }
}

async function fetchFeed() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setStatus('loading','FETCHING');

  const xml = await fetchRSS();
  btn.classList.remove('spinning');

  if (!xml) {
    setStatus('error','FAILED');
    if (allItems.length === 0) {
      document.getElementById('feedScroll').innerHTML = `
        <div class="state-box">
          <div class="icon">⚠️</div>
          <p>Gagal fetch dari server.<br>
          Pastikan Netlify Functions ter-deploy<br>via GitHub atau Netlify CLI.<br><br>
          <span style="color:#4a5568">Drag & drop tidak support Functions.</span></p>
        </div>`;
    }
    setTimeout(fetchFeed, 8000);
    return;
  }

  const parsed = parseRSS(xml);

  // First load
  if (seenGuids.size === 0) {
    allItems = parsed;
    parsed.forEach(i => seenGuids.add(i.guid));
    sendToSW({ type:'INIT_GUIDS', guids:[...seenGuids] });
  } else {
    const newItems = parsed.filter(i => !seenGuids.has(i.guid));
    if (newItems.length > 0) handleNewItems(newItems);
  }

  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const mn = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('lastUpdate').textContent = `${h}:${mn} WIB`;
  setStatus('live','LIVE');

  updateStats();
  renderFeed();
}

// ── RENDER ───────────────────────────────────────────────
function renderFeed(markNew = false) {
  const scroll = document.getElementById('feedScroll');
  const newGuids = markNew ? new Set(allItems.slice(0, 10).map(i=>i.guid)) : new Set();

  let items = activeFilter === 'all'
    ? allItems
    : allItems.filter(i => detectCat(i.title) === activeFilter);

  if (items.length === 0) {
    scroll.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>Tidak ada berita untuk kategori ini</p></div>`;
    return;
  }

function sanitizeDesc(html) {
  if (!html) return '';
  // Strip script tags and their content entirely
  let clean = html.replace(/<script[\s\S]*?<\/script>/gi, '');
  // Strip style tags
  clean = clean.replace(/<style[\s\S]*?<\/style>/gi, '');
  // Strip all remaining HTML tags but keep text
  clean = clean.replace(/<[^>]+>/g, ' ');
  // Decode common HTML entities
  clean = clean.replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&nbsp;/g,' ').replace(/&#39;/g,"'").replace(/&quot;/g,'"');
  // Collapse whitespace
  clean = clean.replace(/\s+/g, ' ').trim();
  return clean;
}

  scroll.innerHTML = items.map((item, idx) => {
    const cat = detectCat(item.title);
    const isNew = markNew && newGuids.has(item.guid) && idx < 5;
    const rawDesc = sanitizeDesc(item.desc);
    const descHtml = rawDesc.length > 10 ? `<div class="item-desc">${rawDesc}</div>` : '';
    const newBadge = isNew ? `<span class="new-badge">NEW</span>` : '';
    return `
      <div class="feed-item cat-${cat}" onclick="openLink('${item.link}')" style="animation-delay:${Math.min(idx,15)*0.025}s">
        <div class="item-meta">
          <span class="item-time">${fmtTime(item.pubDate)}</span>
          <span class="item-tag tag-${cat}">${cat.replace('-',' ')}</span>
          ${newBadge}
        </div>
        <div class="item-title">${item.title}</div>
        ${descHtml}
      </div>`;
  }).join('');
}

function openLink(url) { if(url) window.open(url,'_blank'); }

function fmtTime(ds) {
  const d = new Date(ds);
  const wib = new Date(d.getTime() + 7*3600000);
  const h = String(wib.getUTCHours()).padStart(2,'0');
  const m = String(wib.getUTCMinutes()).padStart(2,'0');
  const dd = String(wib.getUTCDate()).padStart(2,'0');
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][wib.getUTCMonth()];
  return `${h}:${m} · ${dd} ${mo}`;
}

function updateStats() {
  document.getElementById('sTotal').textContent = allItems.length;
  document.getElementById('sMoving').textContent = allItems.filter(i=>detectCat(i.title)==='market-moving').length;
  document.getElementById('sFx').textContent = allItems.filter(i=>detectCat(i.title)==='forex').length;
  document.getElementById('sMacro').textContent = allItems.filter(i=>detectCat(i.title)==='macro').length;
  document.getElementById('sEnergy').textContent = allItems.filter(i=>detectCat(i.title)==='energy').length;
  document.getElementById('sGeo').textContent = allItems.filter(i=>detectCat(i.title)==='geopolitical').length;
}

function setStatus(state, text) {
  document.getElementById('dot').className = 'dot ' + state;
  document.getElementById('statusText').textContent = text;
}

// ── AUTO REFRESH ─────────────────────────────────────────
function toggleAuto() {
  const on = document.getElementById('autoToggle').checked;
  const cd = document.getElementById('cdText');
  if (on) {
    cdVal = 60; cd.textContent = '60s';
    autoInterval = setInterval(() => { fetchFeed(); cdVal=60; }, 60000);
    cdInterval = setInterval(() => { cdVal--; cd.textContent=cdVal+'s'; if(cdVal<=0)cdVal=60; }, 1000);
    sendToSW({ type:'CHECK_NOW' });
  } else {
    clearInterval(autoInterval); clearInterval(cdInterval);
    cd.textContent = '';
  }
}

// ── TOAST ────────────────────────────────────────────────
let toastTimer = null;
function showToast(title, body, ms=3000) {
  const t = document.getElementById('toast');
  document.getElementById('toastTitle').textContent = title;
  document.getElementById('toastBody').textContent = body;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.style.display='none', ms);
}
document.getElementById('toast').addEventListener('click', () => {
  document.getElementById('toast').style.display='none';
});

// ── DIGEST ───────────────────────────────────────────────

const SESSIONS = {
  morning:   { label_id:'Sesi Asia',    label_en:'Asia Session',     time:'06:55', wib:[6,55]  },
  afternoon: { label_id:'Sesi London',  label_en:'London Session',   time:'13:55', wib:[13,55] },
  evening:   { label_id:'Sesi New York',label_en:'New York Session', time:'20:25', wib:[20,25] },
};

let currentSession = 'morning';
let digestCache = {}; // { session: digestData }
let digestCheckInterval = null;
let activeView = 'feed'; // 'feed' | 'digest'

function getWIBNow() {
  const now = new Date();
  return new Date(now.getTime() + 7 * 3600000);
}

function getNextDigestInfo() {
  const wib = getWIBNow();
  const hNow = wib.getUTCHours();
  const mNow = wib.getUTCMinutes();
  const totalNow = hNow * 60 + mNow;

  const times = [
    { session:'morning',   total: 6*60+55  },
    { session:'afternoon', total:13*60+55  },
    { session:'evening',   total:20*60+25  },
  ];

  for (const t of times) {
    if (totalNow < t.total) {
      const diff = t.total - totalNow;
      return { session: t.session, minutesLeft: diff };
    }
  }
  // Past 20:25 → next is tomorrow morning
  const diff = (24*60 + 6*60+55) - totalNow;
  return { session: 'morning', minutesLeft: diff };
}

function getCurrentSession() {
  const wib = getWIBNow();
  const h = wib.getUTCHours(), m = wib.getUTCMinutes();
  const total = h * 60 + m;
  if (total >= 6*60+55  && total < 13*60+55) return 'morning';
  if (total >= 13*60+55 && total < 20*60+25) return 'afternoon';
  if (total >= 20*60+25) return 'evening';
  return 'morning';
}

function startDigestScheduler() {
  if (digestCheckInterval) clearInterval(digestCheckInterval);
  digestCheckInterval = setInterval(() => {
    const wib = getWIBNow();
    const h = wib.getUTCHours(), m = wib.getUTCMinutes(), s = wib.getUTCSeconds();
    // Trigger at xx:55:00 or 20:25:00 (within first 30s window)
    const isTrigger = (
      ((h === 6  && m === 55) ||
       (h === 13 && m === 55) ||
       (h === 20 && m === 25)) && s < 30
    );
    if (isTrigger) {
      const sess = getCurrentSession();
      autoGenerateDigest(sess);
    }
    // Update next digest countdown in panel if visible
    if (activeView === 'digest') updateNextDigestLabel();
  }, 15000); // check every 15s
}

async function autoGenerateDigest(session) {
  // Generate silently
  const data = await callDigestAPI(session);
  if (!data) return;
  digestCache[session] = data;

  // Push notification
  const sess = SESSIONS[session];
  const notifBody = `${data.summary_id.substring(0, 120)}...`;
  if (notifEnabled && Notification.permission === 'granted') {
    sendToSW({
      type: 'SHOW_DIGEST_NOTIF',
      title: `📋 ${sess.label_id} Digest`,
      body: notifBody,
      session,
    });
    // Fallback direct notif
    try {
      new Notification(`📋 ${sess.label_id} — FJFeed`, { body: notifBody, tag: 'digest-'+session });
    } catch(e) {}
  }

  // In-app toast
  showToast(`📋 ${sess.label_id} Digest Ready`, `Tap tab DIGEST untuk lihat ringkasan`, 5000);

  // Badge digest tab
  const dt = document.getElementById('digestTab');
  if (dt) {
    dt.textContent = '📋 DIGEST 🔴';
    setTimeout(() => { dt.textContent = '📋 DIGEST'; }, 30000);
  }

  // If user is on digest panel, refresh
  if (activeView === 'digest') renderDigestPanel();
}

async function callDigestAPI(session) {
  try {
    const res = await fetch(`/.netlify/functions/digest?session=${session}`, {
      signal: AbortSignal.timeout(25000),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return await res.json();
  } catch(e) {
    console.warn('Digest API failed:', e.message);
    return null;
  }
}

async function generateDigestManual(session) {
  const btn = document.getElementById('digestGenBtn');
  if (btn) { btn.classList.add('loading'); btn.querySelector('span').textContent = 'Generating...'; }

  const data = await callDigestAPI(session);
  if (btn) { btn.classList.remove('loading'); btn.querySelector('span').textContent = 'Generate Now'; }

  if (!data) {
    showToast('Gagal', 'Digest API tidak merespons. Coba lagi.', 3000);
    return;
  }
  digestCache[session] = data;
  renderDigestPanel();
}

function renderDigestPanel() {
  const panel = document.getElementById('digestPanel');
  const next = getNextDigestInfo();
  const nextSess = SESSIONS[next.session];
  const h = Math.floor(next.minutesLeft / 60);
  const m = next.minutesLeft % 60;
  const nextLabel = h > 0 ? `${h}j ${m}m` : `${m} menit`;

  let html = `
    <div class="digest-sessions">
      ${Object.entries(SESSIONS).map(([key, s]) => `
        <button class="sess-btn ${currentSession===key?'active':''}"
          onclick="switchDigestSession('${key}')">${s.label_id}<br><small>${s.time} WIB</small></button>
      `).join('')}
    </div>
    <div class="next-digest">Digest berikutnya: <span>${nextSess.label_id}</span> dalam <span>${nextLabel}</span></div>
  `;

  const data = digestCache[currentSession];
  const sess = SESSIONS[currentSession];

  if (data) {
    const ts = new Date(data.generated_at);
    const wibTs = new Date(ts.getTime() + 7*3600000);
    const timeStr = `${String(wibTs.getUTCHours()).padStart(2,'0')}:${String(wibTs.getUTCMinutes()).padStart(2,'0')} WIB`;

    html += `
      <div class="digest-header">
        <div>
          <div class="digest-title">📋 ${sess.label_id}</div>
          <div class="digest-meta">${data.count} berita · ${timeStr} · <span class="digest-method ${data.method}">${data.method === 'gemini' ? '✨ Gemini AI' : '⚙️ Auto'}</span></div>
        </div>
      </div>

      <div class="digest-card">
        <div class="digest-lang">🇮🇩 Bahasa Indonesia</div>
        <div class="digest-text">${escHtml(data.summary_id)}</div>
      </div>

      <div class="digest-card">
        <div class="digest-lang">🇬🇧 English</div>
        <div class="digest-text">${escHtml(data.summary_en)}</div>
      </div>

      ${data.items?.length > 0 ? `
        <div class="digest-card">
          <div class="digest-hl-title">Top Headlines</div>
          <div class="digest-headlines">
            ${data.items.map(i => `<div class="digest-hl-item">• ${escHtml(i.title)}</div>`).join('')}
          </div>
        </div>
      ` : ''}
    `;
  } else {
    html += `
      <div class="state-box" style="padding:40px 20px">
        <div class="icon">📋</div>
        <p>Belum ada digest untuk ${sess.label_id}.<br>
        Akan auto-generate pukul ${sess.time} WIB.<br>
        Atau generate sekarang:</p>
      </div>
    `;
  }

  html += `
    <button class="digest-gen-btn" id="digestGenBtn" onclick="generateDigestManual('${currentSession}')">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      <span>Generate ${data ? 'Ulang' : 'Now'}</span>
    </button>
  `;

  panel.innerHTML = html;
}

function switchDigestSession(session) {
  currentSession = session;
  renderDigestPanel();
}

function updateNextDigestLabel() {
  const el = document.querySelector('.next-digest');
  if (!el) return;
  const next = getNextDigestInfo();
  const nextSess = SESSIONS[next.session];
  const h = Math.floor(next.minutesLeft / 60);
  const m = next.minutesLeft % 60;
  const nextLabel = h > 0 ? `${h}j ${m}m` : `${m} menit`;
  el.innerHTML = `Digest berikutnya: <span>${nextSess.label_id}</span> dalam <span>${nextLabel}</span>`;
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── VIEW SWITCHING ────────────────────────────────────────

document.querySelectorAll('.ftab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (btn.dataset.view === 'digest') {
      activeView = 'digest';
      document.getElementById('feedScroll').style.display = 'none';
      document.getElementById('digestPanel').style.display = 'block';
      currentSession = getCurrentSession();
      renderDigestPanel();
    } else {
      activeView = 'feed';
      document.getElementById('feedScroll').style.display = 'block';
      document.getElementById('digestPanel').style.display = 'none';
      activeFilter = btn.dataset.cat;
      renderFeed();
    }
  });
});

// Start scheduler on load
startDigestScheduler();
window.addEventListener('load', () => {
  // Check notif permission
  if (Notification.permission === 'granted') {
    notifEnabled = true;
    document.getElementById('notifBtn').classList.add('enabled');
  }
  setTimeout(fetchFeed, 400);
});
</script>
